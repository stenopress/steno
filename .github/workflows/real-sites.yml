name: Real sites

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

jobs:
  cross-platform:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: ${{ runner.os }}-real-sites-deno-${{ hashFiles('deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-real-sites-deno-
            ${{ runner.os }}-deno-

      - name: Test representative sites
        run: deno task test:sites
