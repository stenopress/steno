name: Publish
on:
  release:
    types: [published]

jobs:
  quality:
    if: github.event.release.target_commitish == 'main'
    uses: ./.github/workflows/ci.yml

  publish:
    needs: quality
    runs-on: ubuntu-latest
    if: github.event.release.target_commitish == 'main'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish package
        run: npx jsr publish
