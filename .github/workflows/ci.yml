name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality-and-portable:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-

      - name: Check formatting, lint, and types
        run: deno task check

      - name: Test portable engine
        run: deno task test:portable

  native-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
      - uses: dtolnay/rust-toolchain@stable
      - name: Test native engine
        run: deno task test:native
