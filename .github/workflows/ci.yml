name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_call:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-

      - name: Check formatting
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Type check
        run: deno check mod.ts

      - name: Run unit and conformance tests
        run: deno task test:unit

      - name: Test representative sites
        run: deno task test:sites

      - name: Check performance budgets
        run: deno task bench:check
        env:
          # Hosted runners are shared and materially slower/noisier than the
          # development baseline. Keep local budgets strict while still
          # rejecting substantial CI regressions.
          STENO_BENCH_BUDGET_MULTIPLIER: "1.5"
