    type: "string"
    default: "hsl(142, 72%, 40%)"
  accentFg:
    type: "string"
    default: "#ffffff"
  accentDark:
    type: "string"
    default: "hsl(142, 76%, 60%)"
  accentDarkHover:
    type: "string"
    default: "hsl(142, 76%, 66%)"
  accentDarkFg:
    type: "string"
    default: "#09090b"
